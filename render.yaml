services:
  - type: web
    name: yafa-design-studio
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # User needs to add this in Render dashboard
    disk:
      name: studio-db
      mountPath: /opt/render/project/src/data
      sizeGB: 1
